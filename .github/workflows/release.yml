name: Release Whisp Client

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Whisp (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            runner: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: .exe
            mihomo_asset: mihomo-windows-amd64
            mihomo_archive: zip
            bundle_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - label: linux-x86_64
            runner: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            ext: ""
            mihomo_asset: mihomo-linux-amd64
            mihomo_archive: gz
            bundle_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/rpm/*.rpm
          - label: macos-x86_64
            runner: macos-13
            triple: x86_64-apple-darwin
            ext: ""
            mihomo_asset: mihomo-darwin-amd64
            mihomo_archive: gz
            bundle_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
          - label: macos-aarch64
            runner: macos-14
            triple: aarch64-apple-darwin
            ext: ""
            mihomo_asset: mihomo-darwin-arm64
            mihomo_archive: gz
            bundle_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Install Linux Tauri deps
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev patchelf

      - name: Download whispera-go-client
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          latest: true
          fileName: 'whispera-go-client-${{ matrix.triple }}${{ matrix.ext }}'
          out-file-path: src-tauri/binaries/

      - name: Download whispera-ml-server
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          latest: true
          fileName: 'whispera-ml-server-${{ matrix.triple }}${{ matrix.ext }}'
          out-file-path: src-tauri/binaries/

      - name: Download mihomo
        shell: bash
        run: |
          MIHOMO_VER="v1.19.8"
          ASSET="${{ matrix.mihomo_asset }}"
          ARCH="${{ matrix.mihomo_archive }}"
          OUT="src-tauri/binaries/mihomo-${{ matrix.triple }}${{ matrix.ext }}"
          mkdir -p src-tauri/binaries
          if [ "$ARCH" = "zip" ]; then
            curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/${ASSET}-${MIHOMO_VER}.zip" -o mihomo.zip
            unzip -o mihomo.zip -d mihomo_tmp/
            mv mihomo_tmp/${ASSET}.exe "$OUT" || mv mihomo_tmp/mihomo*.exe "$OUT"
            rm -rf mihomo.zip mihomo_tmp/
          else
            curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/${ASSET}-${MIHOMO_VER}.gz" -o mihomo.gz
            gunzip -f mihomo.gz
            mv mihomo "$OUT"
            chmod +x "$OUT"
          fi

      - name: Make binaries executable (unix)
        if: matrix.runner != 'windows-latest'
        run: chmod +x src-tauri/binaries/*

      - name: Generate macOS icon (icon.icns)
        if: matrix.runner != 'windows-latest'
        shell: bash
        run: |
          set -e
          ICON_DIR=src-tauri/icons
          SRC=$ICON_DIR/128x128@2x.png
          OUT=$ICON_DIR/icon.icns
          if [ -f "$OUT" ]; then exit 0; fi
          if command -v iconutil >/dev/null 2>&1 && command -v sips >/dev/null 2>&1; then
            ICONSET=$(mktemp -d)/icon.iconset
            mkdir -p "$ICONSET"
            for s in 16 32 64 128 256 512 1024; do
              sips -z $s $s "$SRC" --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
              [ $s -le 512 ] && sips -z $((s*2)) $((s*2)) "$SRC" --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null || true
            done
            iconutil -c icns "$ICONSET" -o "$OUT"
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq icnsutils
            png2icns "$OUT" "$SRC"
          fi
          ls -la "$OUT"

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.triple }}
          includeDebug: false
          includeRelease: true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisp-${{ matrix.label }}-installer
          path: ${{ matrix.bundle_glob }}
          retention-days: 5
          if-no-files-found: ignore

  # ── Android Build ──────────────────────────────────────────────────────────
  # NOTE: Android build requires Tauri 2 mobile refactor (lib.rs + [lib] crate).
  # Until that lands, this job is allowed to fail without blocking the release.
  build-android:
    name: Build Whisp (Android)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Download whispera-go-client (arm64)
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          latest: true
          fileName: 'whispera-go-client-aarch64-linux-android'
          out-file-path: src-tauri/binaries/
        continue-on-error: true

      - name: Install frontend deps
        run: npm ci

      - name: Initialize Tauri Android project
        run: |
          export NDK_HOME="$ANDROID_NDK_HOME"
          npx tauri android init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri Android APK
        run: |
          export NDK_HOME="$ANDROID_NDK_HOME"
          npx tauri android build --apk --target aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: whisp-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          retention-days: 5

# ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, build-android]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: whisp-*-installer
          merge-multiple: true
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: whisp-android-apk
          path: release/
        continue-on-error: true

      - name: Calculate version
        id: ver
        run: |
          git fetch --tags
          BASE="v1.0.0"
          LAST=$(git tag -l "${BASE}.*" | sort -V | tail -n1)
          if [ -z "$LAST" ]; then NEW="${BASE}.1"
          else PATCH=$(echo "$LAST" | awk -F. '{print $NF}'); NEW="${BASE}.$((PATCH+1))"; fi
          echo "tag=$NEW" >> $GITHUB_OUTPUT

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Whisp Client ${{ steps.ver.outputs.tag }}
          files: release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
