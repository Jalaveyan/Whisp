name: Release Whisp Client

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Whisp (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Download whispera-go-client
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          latest: true
          fileName: 'whispera-go-client-x86_64-pc-windows-msvc.exe'
          out-file-path: src-tauri/binaries/

      # Скачиваем ml-server из последнего релиза основного репо (Go native, Gorgonia)
      - name: Download whispera-ml-server
        uses: robinraju/release-downloader@v1.10
        with:
          repository: Jalaveyan/Whispera
          latest: true
          fileName: 'whispera-ml-server.exe'
          out-file-path: src-tauri/binaries/

      - name: Ensure mihomo stub
        shell: bash
        run: |
          if [ ! -f "src-tauri/binaries/mihomo-x86_64-pc-windows-msvc.exe" ]; then
            echo "mihomo stub" > src-tauri/binaries/mihomo-x86_64-pc-windows-msvc.exe
          fi

      - name: Stage ML server
        shell: bash
        run: |
          cp src-tauri/binaries/whispera-ml-server.exe src-tauri/whispera-ml-server.exe || true

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          includeDebug: false
          includeRelease: true

      - name: Copy ML server into bundle
        shell: bash
        run: |
          find src-tauri/target/release/bundle -name "*.exe" -not -name "whispera-ml-server.exe" | head -1 \
            | xargs -I{} dirname {} \
            | xargs -I{} cp src-tauri/binaries/whispera-ml-server.exe {}/ || true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisp-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 5

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: whisp-windows-installer
          path: release/

      - name: Calculate version
        id: ver
        run: |
          git fetch --tags
          BASE="v1.0.0"
          LAST=$(git tag -l "${BASE}.*" | sort -V | tail -n1)
          if [ -z "$LAST" ]; then NEW="${BASE}.1"
          else PATCH=$(echo "$LAST" | awk -F. '{print $3}'); NEW="${BASE}.$((PATCH+1))"; fi
          echo "tag=$NEW" >> $GITHUB_OUTPUT

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Whisp Client ${{ steps.ver.outputs.tag }}
          files: release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
